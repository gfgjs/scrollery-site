<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>og source — 用 headless Edge 截 1200×630 生成 assets/og.png</title>
<style>
  :root {
    --paper: #f6f2e9; --ink: #2b2622; --muted: #6f665c;
    --faint: #a49a8b; --cinn: #c3402b; --line: #e2d9c8;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: var(--paper);
    font-family: "Palatino Linotype", Palatino, Georgia, "Songti SC", SimSun, serif;
  }
  /* 裱边双线 */
  .frame  { position: absolute; inset: 26px; border: 2px solid var(--line); border-radius: 10px; }
  .frame2 { position: absolute; inset: 38px; border: 1px solid var(--line); border-radius: 8px; }

  .row { position: absolute; inset: 0; display: flex; align-items: center; gap: 56px; padding-left: 150px; }

  .seal {
    width: 150px; height: 150px; flex: none; position: relative;
    background: var(--cinn); border-radius: 18px;
    display: grid; place-items: center;
  }
  .seal::after {
    content: ""; position: absolute; inset: 10px;
    border: 4px solid rgba(255, 255, 255, .28); border-radius: 12px;
  }
  .seal span {
    font-family: KaiTi, STKaiti, "Songti SC", SimSun, serif;
    font-size: 92px; color: #fff; transform: translateY(-4px);
  }

  .tx h1 { font-size: 98px; font-weight: 700; color: var(--ink); line-height: 1; letter-spacing: .01em; }
  .tx .zh { margin-top: 28px; font-size: 40px; color: var(--muted); letter-spacing: .16em; }
  .tx .en { margin-top: 12px; font-size: 30px; color: var(--muted); font-style: italic; }

  .url {
    position: absolute; right: 64px; bottom: 54px;
    font-family: Consolas, "Cascadia Mono", monospace;
    font-size: 22px; color: var(--faint);
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="frame2"></div>
  <div class="row">
    <div class="seal"><span>卷</span></div>
    <div class="tx">
      <h1>Scrollery</h1>
      <p class="zh">铺开你的画卷</p>
      <p class="en">Your photo library, unrolled.</p>
    </div>
  </div>
  <div class="url">scrollery.app</div>
</body>
</html>
